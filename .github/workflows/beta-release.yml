name: Build & Beta Release

on:
  push:
    branches:
      - beta

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore "MMT Tools.sln"

      - name: Build Release
        run: |
          msbuild "MMT Tools.sln" `
            /p:Configuration=Release `
            /t:Rebuild `
            /v:minimal

      - name: Verify output exists
        shell: pwsh
        run: |
          $exe = "bin\Release\net48\GMTPC.Tool.exe"
          if (-not (Test-Path $exe)) {
            # Try alternate output path
            $alt = Get-ChildItem -Recurse -Filter "GMTPC.Tool.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($null -eq $alt) {
              Write-Error "Build output GMTPC.Tool.exe not found anywhere."
              exit 1
            }
            Write-Host "Found at: $($alt.FullName)"
          } else {
            Write-Host "Build output verified: $exe"
          }

      - name: Generate timestamp and rename exe
        id: meta
        shell: pwsh
        run: |
          $timestamp = Get-Date -Format "yy-MM-dd-HH-mm"
          $ts  = Get-Date -Format "yyyy-MM-dd HH:mm UTC"
          $msg = "${{ github.event.head_commit.message }}" -replace "`n"," "
          $shortSha = "${{ github.sha }}" | Select-Object -First 7
          
          # Rename the exe
          $src = "bin\Release\net48\GMTPC.Tool.exe"
          $dst = "bin\Release\net48\GMTPC.Tool.${timestamp}.exe"
          if (Test-Path $src) {
            Copy-Item $src $dst
            Write-Host "Renamed to: $dst"
          }
          
          echo "timestamp=$timestamp" >> $env:GITHUB_OUTPUT
          echo "ts=$ts" >> $env:GITHUB_OUTPUT
          echo "msg=$msg" >> $env:GITHUB_OUTPUT
          echo "sha=$shortSha" >> $env:GITHUB_OUTPUT
          echo "filename=GMTPC.Tool.${timestamp}.exe" >> $env:GITHUB_OUTPUT

      - name: Create unique tag
        id: tag
        shell: pwsh
        run: |
          $timestamp = "${{ steps.meta.outputs.timestamp }}"
          $tag = "beta-${timestamp}"
          echo "name=$tag" >> $env:GITHUB_OUTPUT

      - name: Upload to new beta release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: "🔥 Beta ${{ steps.meta.outputs.filename }}"
          body: |
            **Build tự động** — ${{ steps.meta.outputs.ts }}

            > **Commit:** `${{ steps.meta.outputs.sha }}`
            > **Message:** ${{ steps.meta.outputs.msg }}

            ⚠️ Đây là bản beta tự động. Không đảm bảo ổn định.
          draft: false
          prerelease: true
          make_latest: true
          files: |
            bin/Release/net48/GMTPC.Tool.${{ steps.meta.outputs.timestamp }}.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
