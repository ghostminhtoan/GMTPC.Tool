name: Build & Beta Release

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore "MMT Tools.sln"

      - name: Build Release (x64)
        run: |
          msbuild "MMT Tools.sln" `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /t:Rebuild `
            /v:minimal

      - name: Verify output exists
        shell: pwsh
        run: |
          $exe = "bin\x64\Release\GMTPC.Tool.exe"
          if (-not (Test-Path $exe)) {
            # Try alternate output path
            $alt = Get-ChildItem -Recurse -Filter "GMTPC.Tool.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($null -eq $alt) {
              Write-Error "Build output GMTPC.Tool.exe not found anywhere."
              exit 1
            }
            Write-Host "Found at: $($alt.FullName)"
          } else {
            Write-Host "Build output verified: $exe"
          }

      - name: Build timestamp
        id: meta
        shell: pwsh
        run: |
          $ts  = Get-Date -Format "yyyy-MM-dd HH:mm UTC"
          $msg = "${{ github.event.head_commit.message }}" -replace "`n"," "
          echo "ts=$ts"   >> $env:GITHUB_OUTPUT
          echo "msg=$msg" >> $env:GITHUB_OUTPUT

      - name: Upload to fixed beta release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: beta
          name: "🔥 Beta (Latest Build)"
          body: |
            **Build tự động** — ${{ steps.meta.outputs.ts }}

            > **Commit:** `${{ github.sha }}`
            > **Message:** ${{ steps.meta.outputs.msg }}

            ⚠️ Đây là bản beta tự động. Không đảm bảo ổn định.
          draft: false
          prerelease: true
          make_latest: false
          files: |
            bin/x64/Release/GMTPC.Tool.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
