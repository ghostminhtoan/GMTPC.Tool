name: Build & Beta Release

on:
  push:
    branches:
      - beta

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore "GMTPC.Tool.sln"

      - name: Build Release
        run: |
          msbuild "GMTPC.Tool.sln" /p:Configuration=Release /t:Rebuild /v:minimal

      - name: Generate timestamp
        id: meta
        shell: pwsh
        run: |
          $timestamp = Get-Date -Format "yy-MM-dd-HH-mm"
          $ts = Get-Date -Format "yyyy-MM-dd HH:mm UTC"
          $msg = (git log -1 --pretty=%s) -replace "`n"," "
          $sha = (git rev-parse --short HEAD)

          echo "timestamp=$timestamp" >> $env:GITHUB_OUTPUT
          echo "ts=$ts" >> $env:GITHUB_OUTPUT
          echo "msg=$msg" >> $env:GITHUB_OUTPUT
          echo "sha=$sha" >> $env:GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: beta-${{ steps.meta.outputs.timestamp }}
          name: "🔥 Beta GMTPC.Tool.exe (Build ${{ steps.meta.outputs.timestamp }})"
          body: |
            **Build tự động** — ${{ steps.meta.outputs.ts }}

            > **Commit:** ${{ steps.meta.outputs.sha }}
            > **Message:** ${{ steps.meta.outputs.msg }}

            ⚠️ Đây là bản beta tự động. Không đảm bảo ổn định.
          draft: false
          prerelease: true
          make_latest: true
          files: bin/Release/net48/GMTPC.Tool.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
